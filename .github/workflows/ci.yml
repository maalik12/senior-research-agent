name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd ../senior-research-agent
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          cd ../senior-research-agent
          pytest tests/ -v --cov=src --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Lint
        run: |
          pip install black ruff mypy
          black --check ../senior-research-agent/src
          ruff check ../senior-research-agent/src
          mypy ../senior-research-agent/src

  build-images:
    runs-on: ubuntu-latest
    needs: [test-core, lint]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: |
          docker-compose build
